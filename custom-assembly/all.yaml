# Shared Custom Assembly overlay — customizations common to EVERY golden custom
# image, kept in one place instead of repeated per image. The build workflow
# merges this with each per-image overlay (custom-assembly/<repo>.yaml) before
# applying, so a repo ends up with these common bits PLUS its own specifics.
#
# Currently applies: French Canadian locale + the internal CA.

contents:
  # French Canadian locale support — glibc-locale-fr provides fr_CA.UTF-8
  # (Chainguard/Wolfi images are glibc-based; locales ship as per-language pkgs).
  packages:
    - glibc-locale-fr

environment:
  # Default the image locale to French Canadian. LANG leaves per-category LC_*
  # overrides possible; use LC_ALL instead to force fr_CA across all categories.
  LANG: fr_CA.UTF-8

# Bundle your internal CA into the system truststore (replaces the incert step).
# Requires the Custom Assembly custom-certificates Beta — ask your Chainguard
# Customer Success team to enable it before applying.
