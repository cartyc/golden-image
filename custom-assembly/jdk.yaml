# Chainguard Custom Assembly overlay for the golden jdk image.
#
# Same pattern as custom-assembly/python.yaml: Chainguard assembles and SIGNS
# the customized image server-side from this apko overlay — applied by
# .github/workflows/custom-assembly.yaml via `chainctl images repos build apply`.

contents:
  # Additional packages baked into the image (from your entitled repos).
  # Adjust for jdk-specific needs; bash + curl mirror the python overlay.
  packages:
    - bash
    - curl

annotations:
  # Preserves the `LABEL origin="chainguard"` convention.
  origin: chainguard

# Bundle your internal CA. For a JDK image Custom Assembly adds it to BOTH the
# system truststore and the Java truststore (/etc/ssl/certs/java/cacerts), so
# the JVM trusts internal services too. Requires the custom-certificates Beta —
# ask your Chainguard Customer Success team to enable it before applying.
#
# The cert below is a self-signed PLACEHOLDER ("Example Internal Root CA"), the
# same one in python/cert.crt. Replace it with your organization's real root CA.
