# Chainguard Custom Assembly overlay for the golden jdk image.
#
# Image-specific customizations only. Shared bits (internal CA, locale) live in
# custom-assembly/all.yaml and are merged in at apply time. For a JDK image
# Custom Assembly also adds the merged-in CA to the Java truststore
# (/etc/ssl/certs/java/cacerts), so the JVM trusts internal services too.
# Applied by .github/workflows/custom-assembly.yaml via
# `chainctl images repos build apply`.

contents:
  # Additional packages baked into the image (from your entitled repos).
  # Adjust for jdk-specific needs; bash + curl mirror the python overlay.
  packages:
    - bash
    - curl

annotations:
  # Preserves the `LABEL origin="chainguard"` convention.
  origin: chainguard
