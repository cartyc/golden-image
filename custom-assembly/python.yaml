# Chainguard Custom Assembly overlay for the golden python image.
#
# Image-specific customizations only. Shared bits (internal CA, locale) live in
# custom-assembly/all.yaml and are merged in at apply time. Chainguard assembles
# and SIGNS the customized image server-side from this apko overlay. Applied by
# .github/workflows/custom-assembly.yaml via `chainctl images repos build apply`.

contents:
  # Additional packages baked into the image (from your entitled repos).
  packages:
    - bash
    - curl

annotations:
  # Preserves the `LABEL origin="chainguard"` from the old Dockerfile.
  origin: chainguard
