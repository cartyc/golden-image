# Pass-through mirror of Chainguard images into the golden-images registry,
# run by .github/workflows/passthrough-mirror.yaml.
#
# Unlike the build pipeline (python-distroless.yaml), which TRANSFORMS images
# (CA injection via incert, re-signing), this lane copies images AS-IS with
# cgr-sync — preserving the
# multi-arch index and the upstream Chainguard cosign signatures / attestations
# (which a `docker build … && docker push` would drop), and verifying the
# upstream signature before each copy.
#
# Add a pass-through image by appending one entry under `repositories`.

defaults:
  source: cgr.dev/chriscarty.com
  # Full GAR path, e.g. <region>-docker.pkg.dev/<project>/<repo>. Supplied by the
  # workflow from the DEST_REGISTRY secret (${VAR} is expanded from the env).
  destination: ${DEST_REGISTRY}
  tags:
    list: ["latest"]
  # Verify the upstream Chainguard signature before mirroring (same identity the
  # build pipelines verify against). A failed check blocks the copy.
  verify:
    enabled: true
    certificate_identity: https://github.com/chainguard-images/images-private/.github/workflows/release.yaml@refs/heads/main
    certificate_oidc_issuer: https://token.actions.githubusercontent.com

repositories:
  # Distroless python, mirrored as-is. (The -dev variant's customizations now
  # move to Chainguard Custom Assembly rather than a derived Dockerfile.)
  - name: python
    tags:
      list: ["latest", "3.12"]

  # Custom Assembly variant (bash + curl + internal CA), built & signed by
  # Chainguard from custom-assembly/python.yaml. Mirrored as-is like any other
  # cgr.dev image. NOTE: only mirrors once the image exists — run the one-time
  # `chainctl image repo build edit --parent chriscarty.com --repo python
  # --save-as custom-python` bootstrap first.
  - name: custom-python
    tags:
      list: ["latest"]
    # Custom Assembly images are signed by your org's CA builder identity (not
    # the upstream chainguard-images release identity), so override verify with
    # the enforce.dev issuer scoped to this org's UIDP. Tighten the regexp to
    # the exact catalog-syncer / apko-builder identity IDs if you want — see
    # https://edu.chainguard.dev/chainguard/chainguard-images/how-to-use/verifying-chainguard-images-and-metadata-signatures-with-cosign/
    verify:
      enabled: true
      certificate_oidc_issuer: https://issuer.enforce.dev
      certificate_identity_regexp: https://issuer.enforce.dev/834556885ebd02f51dc11f57b826ec01ed24d377/.*

  # Custom Assembly jdk variant, built & signed by Chainguard from
  # custom-assembly/jdk.yaml. Same notes as custom-python — run the one-time
  # `chainctl image repo build edit --parent chriscarty.com --repo jdk
  # --save-as custom-jdk` bootstrap first.
  - name: custom-jdk
    tags:
      list: ["latest"]
    verify:
      enabled: true
      certificate_oidc_issuer: https://issuer.enforce.dev
      certificate_identity_regexp: https://issuer.enforce.dev/834556885ebd02f51dc11f57b826ec01ed24d377/.*
