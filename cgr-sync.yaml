# Pass-through mirror of Chainguard images into the golden-images registry,
# run by .github/workflows/passthrough-mirror.yaml.
#
# Unlike the build pipeline (python-distroless.yaml), which TRANSFORMS images
# (CA injection via incert, re-signing), this lane copies images AS-IS with
# cgr-sync — preserving the multi-arch index and the upstream Chainguard cosign
# signatures / attestations (which a `docker build … && docker push` would
# drop), and verifying the upstream signature before each copy.
#
# Add a pass-through image by appending one entry under `repositories`.

defaults:
  # Your Chainguard org's registry namespace, supplied by the workflow from the
  # CHAINGUARD_ORG secret (${VAR} is expanded from the env by cgr-sync at load).
  source: cgr.dev/${CHAINGUARD_ORG}
  # Full GAR path, e.g. <region>-docker.pkg.dev/<project>/<repo>. Supplied by the
  # workflow from the DEST_REGISTRY secret (${VAR} is expanded from the env).
  destination: ${DEST_REGISTRY}
  tags:
    list: ["latest"]
  # Verify the org's cosign signature before mirroring; a failed check blocks the
  # copy. All of the org's cgr.dev images (stock and Custom Assembly) are
  # signed keyless by an enforce.dev identity under this org's UIDP — validated
  # with `cosign verify` against the live python/jdk images. The UIDP is injected
  # from the CHAINGUARD_ORG_UIDP env (a repo secret set by the workflow);
  # ${VAR} is expanded by cgr-sync at load time.
  verify:
    enabled: true
    certificate_oidc_issuer: https://issuer.enforce.dev
    certificate_identity_regexp: https://issuer.enforce.dev/${CHAINGUARD_ORG_UIDP}/.*

repositories:
  # Distroless python, mirrored as-is. (The -dev variant's customizations now
  # move to Chainguard Custom Assembly rather than a derived Dockerfile.)
  - name: python
    tags:
      list: ["latest", "3.12"]

  # Custom Assembly variant (bash + curl + internal CA), built & signed by
  # Chainguard from custom-assembly/python.yaml — inherits the verify policy
  # above. Only mirrors once the image exists; run the one-time
  # `chainctl image repo build edit --parent <your-org> --repo python --save-as custom-python`
  # bootstrap first.
  - name: custom-python
    tags:
      list: ["latest"]

  # Custom Assembly jdk variant from custom-assembly/jdk.yaml — same one-time
  # bootstrap with `--repo jdk --save-as custom-jdk`.
  - name: custom-jdk
    tags:
      list: ["latest"]
