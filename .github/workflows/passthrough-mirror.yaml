name: Passthrough mirror (cgr-sync)

# Mirror pass-through Chainguard images straight into the golden-images registry
# using cgr-sync (github.com/cartyc/image-syncer). This preserves multi-arch
# indexes and the upstream cosign signatures/attestations — which a docker
# build/push flattens away — and verifies each image's signature before copying.
# Complements the per-image build pipelines, which TRANSFORM images.

on:
  # Timer-driven reconcile only — the mirror runs on a schedule, not on merges.
  # Use the manual trigger to mirror immediately after a catalog/config change.
  schedule:
    - cron: "0 */6 * * *" # reconcile the catalog every 6h
  workflow_dispatch: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # setup-chainctl (source auth)
    env:
      # Consumed by cgr-sync.yaml as ${CHAINGUARD_ORG} (source namespace),
      # ${DEST_REGISTRY} (destination), and ${CHAINGUARD_ORG_UIDP} (verify regexp).
      CHAINGUARD_ORG: ${{ secrets.CHAINGUARD_ORG }}
      DEST_REGISTRY: ${{ secrets.DEST_REGISTRY }}
      CHAINGUARD_ORG_UIDP: ${{ secrets.CHAINGUARD_ORG_UIDP }}
    steps:
      - name: Checkout (golden-image)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Auth to Chainguard source (cgr.dev)
        uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          identity: ${{ secrets.CHAINGUARD_IDENTITY }}

      - name: Install cosign (verify-before-mirror)
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a

      - name: Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev --quiet

      # Pull the pinned cgr-sync release image and extract its binary, instead
      # of checking out the source and building it. The binary runs on the
      # runner so it reuses the host keychain (cgr.dev + GAR auth above) and the
      # host cosign for verify-before-mirror. Bump CGR_SYNC_IMAGE to upgrade.
      - name: Fetch cgr-sync binary
        env:
          CGR_SYNC_IMAGE: ghcr.io/cartyc/image-syncer:v0.1.3
        run: |
          cid=$(docker create "$CGR_SYNC_IMAGE")
          docker cp "$cid:/usr/bin/cgr-sync" "$RUNNER_TEMP/cgr-sync"
          docker rm "$cid" >/dev/null
          "$RUNNER_TEMP/cgr-sync" -version

      - name: Mirror images
        run: |
          "$RUNNER_TEMP/cgr-sync" sync -config cgr-sync.yaml -continue-on-error

  # Independently verify the golden images that landed in Artifact Registry:
  # a grype CVE scan (gate) plus a cosign SBOM-attestation check. Runs after the
  # mirror regardless of its outcome (so images that did land are still checked);
  # images not yet present (e.g. a pre-bootstrap custom-*) are skipped.
  verify:
    needs: mirror
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      DEST_REGISTRY: ${{ secrets.DEST_REGISTRY }}
      # Expands the verify identity regexp in cgr-sync.yaml for the helper below.
      CHAINGUARD_ORG_UIDP: ${{ secrets.CHAINGUARD_ORG_UIDP }}
      # Lowest severity that fails the scan; override with a repo/org variable.
      GRYPE_FAIL_ON: ${{ vars.GRYPE_FAIL_ON || 'critical' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a

      - name: Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev --quiet

      - name: Install cosign
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1

      - name: Install grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Scan + verify golden images
        run: |
          set -uo pipefail
          python3 scripts/list-golden-images.py cgr-sync.yaml > "$RUNNER_TEMP/images.tsv"
          fail=0
          while IFS=$'\t' read -r name tag issuer identity idregex; do
            ref="${DEST_REGISTRY}/${name}:${tag}"
            if ! docker manifest inspect "$ref" >/dev/null 2>&1; then
              echo "::notice::skip ${ref} (not present yet — e.g. a pre-bootstrap custom image)"
              continue
            fi
            echo "::group::verify ${ref}"

            # CVE gate.
            if grype "$ref" --fail-on "$GRYPE_FAIL_ON" -q; then
              echo "grype: ok (no findings >= ${GRYPE_FAIL_ON})"
            else
              echo "::error::grype found findings >= ${GRYPE_FAIL_ON} in ${ref}"; fail=1
            fi

            # SBOM attestation, signed by the same identity cgr-sync mirrors
            # under. The helper emits "-" for unset fields (never an empty
            # column), so a regexp-only policy can't collapse into the identity
            # slot during the tab-delimited read above.
            args=(--type spdx --certificate-oidc-issuer "$issuer")
            [ "$identity" != "-" ] && args+=(--certificate-identity "$identity")
            [ "$idregex" != "-" ]  && args+=(--certificate-identity-regexp "$idregex")
            if cosign verify-attestation "${args[@]}" "$ref" >/dev/null 2>&1; then
              echo "cosign: SBOM attestation verified"
            else
              echo "::error::SBOM attestation verification failed for ${ref}"; fail=1
              # Surface why: re-run without suppression, and list what cosign can
              # actually discover on the mirror (sig/att tags + referrers).
              echo "--- cosign verify-attestation stderr ---"
              cosign verify-attestation "${args[@]}" "$ref" || true
              echo "--- cosign tree ${ref} ---"
              cosign tree "$ref" || true
            fi

            echo "::endgroup::"
          done < "$RUNNER_TEMP/images.tsv"
          exit $fail
