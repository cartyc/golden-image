name: Python Dev Image builder

on:
  push:
    branches: [ main ]
    paths:
      - python/**
  pull_request:
    branches: [ main ]
    paths:
      - python/**

env:
  IMAGE: python
  TAG: 3.12-dev

jobs:
  login:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # used to sign the commits using gitsign

    steps:
      - uses: chainguard-dev/setup-chainctl@main
        with:
          identity: 834556885ebd02f51dc11f57b826ec01ed24d377/60bc36d56b605215
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Build Image
        run: |
          docker build -f python/Dockerfile.dev --build-arg ARTIFACTORY_HOSTNAME=${{ secrets.ARTIFACTORY_HOSTNAME }} --build-arg ARTIFACTORY_USER_PROFILE=${{ secrets.ARTIFACTORY_USER_PROFILE }} --build-arg WOLFI_TOKEN=${{ secrets.WOLFI_TOKEN }} --build-arg EXTRAS_TOKEN=${{ secrets.EXTRAS_TOKEN }} -t ${{ secrets.DEST_REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }} .

      - name: Scan
        uses: anchore/scan-action@7c05671ae9be166aeb155bad2d7df9121823df32
        with:
          image: ${{ secrets.DEST_REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }}
          fail-build: true
          severity-cutoff: critical

      - id: "auth"
        uses: "google-github-actions/auth@71f986410dfbc7added4569d411d040a91dc6935"
        with:
          credentials_json: "${{ secrets.SERVICE_ACCOUNT_KEY }}"
      
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@77e7a554d41e2ee56fc945c52dfd3f33d12def9a"

      - name: "Use gcloud CLI"
        run: "gcloud info"

      - name: "Docker auth"
        run: |-
          gcloud auth configure-docker ${{ secrets.REGION }}-docker.pkg.dev --quiet
      
      - name: Push image
        run: docker push ${{ secrets.DEST_REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG }}