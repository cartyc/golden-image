name: Custom Assembly build

# Build customized images (bash + curl, internal CA) via Chainguard Custom
# Assembly — Chainguard assembles and signs them server-side from the overlays
# in custom-assembly/. Replaces the docker-build-based pipelines.
#
# One-time bootstrap per image (the declarative `apply` cannot create an image,
# and `--save-as` only works with `edit`). Pass --file so edit uses the overlay
# instead of an interactive editor; the CI identity also needs the repo.update
# capability. See the README "Prerequisites" section.
#
#   chainctl image repo build edit --parent <your-org> --repo python \
#     --file custom-assembly/python.yaml --save-as custom-python
#   chainctl image repo build edit --parent <your-org> --repo jdk \
#     --file custom-assembly/jdk.yaml    --save-as custom-jdk
#
# After that, this workflow keeps each custom image in sync with its overlay.

on:
  push:
    branches: [main]
    paths:
      - custom-assembly/**
      - .github/workflows/custom-assembly.yaml
  pull_request:
    branches: [main]
    paths:
      - custom-assembly/**
      - .github/workflows/custom-assembly.yaml
  schedule:
    # Daily drift check — alert if a repo's live Custom Assembly config has
    # drifted from the committed overlays (out-of-band edits via console/CLI).
    - cron: "30 5 * * *"
  workflow_dispatch: {}

permissions: {}

# Serialize real applies: pushes/dispatch/schedule on main share the main-ref
# group so an apply and a drift check can't run at once. PR runs are grouped per
# ref and cancel their own superseded runs.
concurrency:
  group: custom-assembly-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  custom-assembly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # assume the Chainguard identity
    strategy:
      fail-fast: false
      matrix:
        include:
          - file: custom-assembly/python.yaml
            repo: custom-python
          - file: custom-assembly/jdk.yaml
            repo: custom-jdk
    env:
      PARENT: ${{ secrets.CHAINGUARD_ORG }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Auth to Chainguard
        uses: chainguard-dev/setup-chainctl@2cddd35a2f120d9973e58094dc6878c93cf58c28 # v0.5.1
        with:
          # Identity needs the repo.update permission for Custom Assembly builds.
          identity: ${{ secrets.CHAINGUARD_IDENTITY }}

      # `apply --file` REPLACES a repo's whole config, so layer the shared
      # overlay (custom-assembly/all.yaml — internal CA, locale, common env)
      # with this image's specifics into one complete config. `*+` deep-merges
      # maps and APPENDS arrays, so packages concatenate and per-image scalars
      # win. yq is preinstalled on the GitHub-hosted runner.
      - name: Merge shared overlay with ${{ matrix.repo }}
        run: |
          yq eval-all 'select(fi==0) *+ select(fi==1)' \
            custom-assembly/all.yaml "${{ matrix.file }}" > "$RUNNER_TEMP/merged.yaml"
          echo "::group::effective config for ${{ matrix.repo }}"
          cat "$RUNNER_TEMP/merged.yaml"
          echo "::endgroup::"

      # On PRs: preview the change, informational only. `apply --dry-run` exits
      # non-zero whenever config WOULD change — the normal case for a PR that
      # edits an overlay — so don't gate on it; just surface the diff. The real
      # apply runs on merge. Skip on fork PRs: secrets/OIDC aren't available
      # there, so the assume would fail anyway.
      - name: Preview ${{ matrix.repo }} (diff)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if chainctl images repos build apply \
               --file "$RUNNER_TEMP/merged.yaml" \
               --parent "$PARENT" --repo "${{ matrix.repo }}" --dry-run; then
            echo "${{ matrix.repo }}: no pending changes"
          else
            echo "::notice::${{ matrix.repo }}: merging this PR will update its live Custom Assembly config (diff above)"
          fi

      # Scheduled: drift detection only — fail (don't apply) if the live config
      # has drifted from the committed overlays. `apply --dry-run` exits non-zero
      # when changes would apply, which is exactly the drift signal here.
      - name: Drift check ${{ matrix.repo }} (scheduled)
        if: github.event_name == 'schedule'
        run: |
          chainctl images repos build apply \
            --file "$RUNNER_TEMP/merged.yaml" \
            --parent "$PARENT" --repo "${{ matrix.repo }}" --dry-run

      # On main / manual dispatch: apply and trigger the build.
      - name: Apply ${{ matrix.repo }} and build
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          chainctl images repos build apply \
            --file "$RUNNER_TEMP/merged.yaml" \
            --parent "$PARENT" --repo "${{ matrix.repo }}" --yes
