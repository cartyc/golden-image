name: Custom Assembly build

# Build customized images (bash + curl, internal CA) via Chainguard Custom
# Assembly — Chainguard assembles and signs them server-side from the overlays
# in custom-assembly/. Replaces the docker-build-based pipelines.
#
# One-time bootstrap per image (the declarative `apply` cannot create an image,
# and `--save-as` only works with `edit`). Pass --file so edit uses the overlay
# instead of an interactive editor; the CI identity also needs the repo.update
# capability. See the README "Prerequisites" section.
#
#   chainctl image repo build edit --parent <your-org> --repo python \
#     --file custom-assembly/python.yaml --save-as custom-python
#   chainctl image repo build edit --parent <your-org> --repo jdk \
#     --file custom-assembly/jdk.yaml    --save-as custom-jdk
#
# After that, this workflow keeps each custom image in sync with its overlay.

on:
  push:
    branches: [main]
    paths:
      - custom-assembly/**
      - .github/workflows/custom-assembly.yaml
  pull_request:
    branches: [main]
    paths:
      - custom-assembly/**
      - .github/workflows/custom-assembly.yaml
  workflow_dispatch: {}

permissions: {}

jobs:
  custom-assembly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # assume the Chainguard identity
    strategy:
      fail-fast: false
      matrix:
        include:
          - file: custom-assembly/python.yaml
            repo: custom-python
          - file: custom-assembly/jdk.yaml
            repo: custom-jdk
    env:
      PARENT: ${{ secrets.CHAINGUARD_ORG }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Auth to Chainguard
        uses: chainguard-dev/setup-chainctl@main
        with:
          # Identity needs the repo.update permission for Custom Assembly builds.
          identity: ${{ secrets.CHAINGUARD_IDENTITY }}

      # `apply --file` REPLACES a repo's whole config, so layer the shared
      # overlay (custom-assembly/all.yaml — internal CA, locale, common env)
      # with this image's specifics into one complete config. `*+` deep-merges
      # maps and APPENDS arrays, so packages concatenate and per-image scalars
      # win. yq is preinstalled on the GitHub-hosted runner.
      - name: Merge shared overlay with ${{ matrix.repo }}
        run: |
          yq eval-all 'select(fi==0) *+ select(fi==1)' \
            custom-assembly/all.yaml "${{ matrix.file }}" > "$RUNNER_TEMP/merged.yaml"
          echo "::group::effective config for ${{ matrix.repo }}"
          cat "$RUNNER_TEMP/merged.yaml"
          echo "::endgroup::"

      # On PRs: preview only — non-zero exit if the live config would change.
      # Skip on fork PRs: secrets/OIDC aren't available there, so the assume
      # would fail anyway — and we never want to run authed steps for forks.
      - name: Preview ${{ matrix.repo }} (drift check)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          chainctl images repos build apply \
            --file "$RUNNER_TEMP/merged.yaml" \
            --parent "$PARENT" --repo "${{ matrix.repo }}" --dry-run

      # On main / manual dispatch: apply and trigger the build.
      - name: Apply ${{ matrix.repo }} and build
        if: github.event_name != 'pull_request'
        run: |
          chainctl images repos build apply \
            --file "$RUNNER_TEMP/merged.yaml" \
            --parent "$PARENT" --repo "${{ matrix.repo }}" --yes
