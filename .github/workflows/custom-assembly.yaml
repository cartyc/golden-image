name: Custom Assembly build

# Build the customized python image (bash + curl) via Chainguard Custom
# Assembly — Chainguard assembles and signs it server-side from
# custom-assembly/python.yaml. Replaces the docker-build-based python-dev flow.
#
# One-time bootstrap (the declarative `apply` cannot create an image, and
# `--save-as` only works with `edit`):
#
#   chainctl image repo build edit --parent chriscarty.com --repo python \
#     --save-as custom-python
#
# After that, this workflow keeps custom-python in sync with the config.

on:
  push:
    branches: [main]
    paths:
      - custom-assembly/python.yaml
      - .github/workflows/custom-assembly.yaml
  pull_request:
    branches: [main]
    paths:
      - custom-assembly/python.yaml
      - .github/workflows/custom-assembly.yaml
  workflow_dispatch: {}

permissions: {}

jobs:
  custom-assembly:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # assume the Chainguard identity
    env:
      PARENT: chriscarty.com
      REPO: custom-python
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Auth to Chainguard
        uses: chainguard-dev/setup-chainctl@main
        with:
          # Identity needs the repo.update permission for Custom Assembly builds.
          identity: 834556885ebd02f51dc11f57b826ec01ed24d377/60bc36d56b605215

      # On PRs: preview only — non-zero exit if the live config would change.
      - name: Preview config (drift check)
        if: github.event_name == 'pull_request'
        run: |
          chainctl images repos build apply \
            --file custom-assembly/python.yaml \
            --parent "$PARENT" --repo "$REPO" --dry-run

      # On main / manual dispatch: apply and trigger the build.
      - name: Apply config and build
        if: github.event_name != 'pull_request'
        run: |
          chainctl images repos build apply \
            --file custom-assembly/python.yaml \
            --parent "$PARENT" --repo "$REPO" --yes
